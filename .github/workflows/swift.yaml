name: Swift

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DERIVED_DATA_PATH: ".build"

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print Swift version
        run: swift --version

      - name: Cache SwiftFormat
        uses: actions/cache@v4
        with:
          path: .swiftformat.cache
          key: ${{ runner.os }}-swiftformat-${{ hashFiles('.swiftformat') }}
          restore-keys: |
            ${{ runner.os }}-swiftformat-

      - name: Run SwiftFormat
        # SwiftFormat is preinstalled on macOS runners. Rules and Swift version
        # are pinned in the repo's .swiftformat config.
        run: swiftformat --cache .swiftformat.cache --lint .

  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print Swift version
        run: swift --version

      - name: Cache Swift packages
        id: cache-swift
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Build Debug
        run: swift build -v

      - name: Build Release
        run: swift build -c release -v

      - name: Build CLI
        run: swift build -c release --product OpenTDFKitCLI

  test:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print Swift version
        run: swift --version

      - name: Cache Swift packages
        id: cache-swift
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Run tests with coverage
        run: swift test --enable-code-coverage

      - name: Generate LCOV coverage report
        run: |
          xcrun llvm-cov export \
            -format=lcov \
            -ignore-filename-regex='.build|Tests' \
            -instr-profile=.build/debug/codecov/default.profdata \
            .build/debug/OpenTDFKitPackageTests.xctest/Contents/MacOS/OpenTDFKitPackageTests \
            > coverage.lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.lcov
          fail_ci_if_error: false
          verbose: true

  benchmark:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print Swift version
        run: swift --version

      - name: Cache Swift packages
        id: cache-swift
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Run KeyStore Benchmarks
        run: |
          set -o pipefail
          swift test --configuration release --filter KeyStoreBenchmarkTests | tee keystore-benchmark.log

      - name: Run KASService Benchmarks
        run: |
          set -o pipefail
          swift test --configuration release --filter KASServiceBenchmarkTests | tee kasservice-benchmark.log

      - name: Run NanoTDF Benchmarks
        run: |
          set -o pipefail
          swift test --configuration release --filter NanoTDFBenchmarkTests | tee nanotdf-benchmark.log

      - name: Restore benchmark baseline
        uses: actions/cache/restore@v4
        with:
          path: benchmark-baseline.json
          key: benchmark-baseline-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            benchmark-baseline-${{ runner.os }}-${{ github.ref }}-
            benchmark-baseline-${{ runner.os }}-refs/heads/main-
            benchmark-baseline-${{ runner.os }}-

      - name: Check benchmark regression
        run: python3 scripts/parse_benchmarks.py --threshold 0.30 --baseline benchmark-baseline.json --output benchmark-baseline.json *.log

      - name: Save benchmark baseline
        if: always()
        uses: actions/cache/save@v4
        with:
          path: benchmark-baseline.json
          key: benchmark-baseline-${{ runner.os }}-${{ github.ref }}-${{ github.run_id }}

      - name: Upload benchmark logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            *-benchmark.log
            benchmark-baseline.json
          retention-days: 7
